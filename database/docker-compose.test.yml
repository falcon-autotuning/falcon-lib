version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: falcon-test-db
    environment:
      POSTGRES_USER: falcon_test
      POSTGRES_PASSWORD: falcon_test_password
      POSTGRES_DB: falcon_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U falcon_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_test_data:
