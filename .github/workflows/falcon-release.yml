name: Falcon Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Build and push Docker image to GHCR
  push-docker:
    name: Build & Push Docker Image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: packaging/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Test Docker Executables (from local build)
        run: |
          # Build locally again to test before pushing or pull from ghcr
          # Using the already built image if possible, but build-push-action with 'load: true' is needed for local tests.
          # Here we just run a quick check on the built tags.
          for tag in ${{ steps.meta.outputs.tags }}; do
            # We only need to test one tag
            ./packaging/docker/test-docker-executables.sh $tag
            break
          done
        shell: bash
