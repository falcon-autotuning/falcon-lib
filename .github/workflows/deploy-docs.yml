# Build mkdocs and deploy the generated site to gh-pages
# Triggers on pushes to the default branch (main)
name: Build and deploy MkDocs site

on:
  push:
    branches:
      - main

permissions:
  pages: write
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Copy documentation files into docs folder
        run: |
          # Create directory structure
          mkdir -p docs/dsl/docs docs/dsl/treesitter docs/dsl/lsp docs/database docs/typing docs/qarrayDevice docs/libs

          # Copy DSL documentation
          cp -v dsl/docs/overview.md docs/dsl/docs/ 2>/dev/null || echo "⚠️  dsl/docs/overview.md not found"
          cp -v dsl/docs/TUTORIAL.md docs/dsl/docs/ 2>/dev/null || echo "⚠️  dsl/docs/TUTORIAL.md not found"
          cp -v dsl/docs/LANGUAGE_REFERENCE.md docs/dsl/docs/ 2>/dev/null || echo "⚠️  dsl/docs/LANGUAGE_REFERENCE.md not found"
          cp -v dsl/docs/CLI.md docs/dsl/docs/ 2>/dev/null || echo "⚠️  dsl/docs/CLI.md not found"
          cp -v dsl/docs/PACKAGE_MANAGER.md docs/dsl/docs/ 2>/dev/null || echo "⚠️  dsl/docs/PACKAGE_MANAGER.md not found"
          cp -v dsl/docs/LSP.md docs/dsl/docs/ 2>/dev/null || echo "⚠️  dsl/docs/LSP.md not found"
          cp -rv dsl/treesitter docs/dsl/ 2>/dev/null || echo "⚠️  dsl/treesitter not found"
          cp -rv dsl/lsp docs/dsl/ 2>/dev/null || echo "⚠️  dsl/lsp not found"

          # Copy other top-level documentation
          cp -rv database docs/ 2>/dev/null || echo "⚠️  database not found"
          cp -rv typing docs/ 2>/dev/null || echo "⚠️  typing not found"
          cp -rv qarrayDevice docs/ 2>/dev/null || echo "⚠️  qarrayDevice not found"
          cp -rv libs docs/ 2>/dev/null || echo "⚠️  libs not found"

          # Verify what we have
          echo "📋 Files in docs folder:"
          find docs -type f -name "*.md" | head -20

      - name: Build MkDocs site
        run: |
          mkdocs build --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
