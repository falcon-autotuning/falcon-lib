# Build mkdocs (runs mkdoxy + doxygen) and deploy the generated site to gh-pages
# Triggers on pushes to the default branch (main). Adjust branch name if yours is different.
name: Build and deploy MkDocs site

on:
  push:
    branches:
      - main

permissions:
  pages: write
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
      - name: Resolve symlinks
        run: |
          # Convert symlinks to actual copies for the build
          find docs -type l -exec sh -c 'link="$1"; target=$(readlink "$link"); rm "$link"; cp -r "$target" "$link"' _ {} \;
      - name: Build MkDocs site (mkdoxy runs as a plugin)
        run: |
          mkdocs build --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
