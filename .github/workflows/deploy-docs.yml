# Build mkdocs and deploy the generated site to gh-pages
# Triggers on pushes to the default branch (main)
name: Build and deploy MkDocs site

on:
  push:
    branches:
      - main

permissions:
  pages: write
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Debug - List root directory
        run: |
          echo "📂 Root directory contents:"
          ls -la
          echo ""
          echo "📂 docs directory contents:"
          ls -la docs/ || echo "docs folder doesn't exist yet"

      - name: Copy documentation files into docs folder
        run: |
          # Create directory structure
          mkdir -p docs/dsl/docs docs/dsl/treesitter docs/dsl/lsp docs/database docs/typing docs/qarrayDevice docs/libs

          # Function to copy, following symlinks
          copy_with_symlinks() {
            if [ -e "$1" ]; then
              if [ -L "$1" ]; then
                # It's a symlink, resolve it
                cp -Lrv "$1" "$2" 2>&1 || echo "⚠️  Failed to copy $1"
              else
                # Regular file/directory
                cp -rv "$1" "$2" 2>&1 || echo "⚠️  Failed to copy $1"
              fi
            else
              echo "⚠️  $1 not found"
            fi
          }

          # Copy DSL documentation
          echo "📋 Copying DSL documentation..."
          copy_with_symlinks "dsl/docs/overview.md" "docs/dsl/docs/"
          copy_with_symlinks "dsl/docs/TUTORIAL.md" "docs/dsl/docs/"
          copy_with_symlinks "dsl/docs/LANGUAGE_REFERENCE.md" "docs/dsl/docs/"
          copy_with_symlinks "dsl/docs/CLI.md" "docs/dsl/docs/"
          copy_with_symlinks "dsl/docs/PACKAGE_MANAGER.md" "docs/dsl/docs/"
          copy_with_symlinks "dsl/docs/LSP.md" "docs/dsl/docs/"
          copy_with_symlinks "dsl/treesitter" "docs/dsl/"
          copy_with_symlinks "dsl/lsp" "docs/dsl/"

          # Copy other top-level documentation
          echo "📋 Copying other documentation..."
          copy_with_symlinks "database" "docs/"
          copy_with_symlinks "typing" "docs/"
          copy_with_symlinks "qarrayDevice" "docs/"
          copy_with_symlinks "libs" "docs/"

          # Remove any broken symlinks that might cause issues
          echo "🔍 Removing broken symlinks from docs..."
          find docs -type l ! -exec test -e {} \; -delete

          # Verify what we have
          echo ""
          echo "✅ Files in docs folder:"
          find docs -type f -name "*.md" | sort
          echo ""
          echo "✅ Total markdown files:"
          find docs -type f -name "*.md" | wc -l

      - name: Build MkDocs site
        run: |
          mkdocs build --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
