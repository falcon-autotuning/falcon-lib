name: Falcon CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # Docker build and test
  build-docker:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v2

      - name: Prepare Docker Metadata
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=${REPO_LOWER}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: packaging/docker/Dockerfile
          load: true
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && !env.ACT }}
          tags: |
            falcon-cli:latest
            ghcr.io/${{ steps.prep.outputs.repo }}:${{ github.ref_name }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
            NUGET_FEED_URL=${{ secrets.NUGET_FEED_URL }}
            NUGET_API_KEY=${{ secrets.NUGET_API_KEY }}

      - name: Test Docker Executables
        run: |
          ./packaging/docker/test-docker-executables.sh falcon-cli:latest
        shell: bash

  # Verification job
  verify-published:
    name: Verify Published Image (${{ matrix.os }})
    needs: build-docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Test Image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/${REPO_LOWER}:${{ github.ref_name }}
          ./packaging/docker/test-docker-executables.sh ghcr.io/${REPO_LOWER}:${{ github.ref_name }}
        shell: bash
