name: Falcon Database CI

on:
  push:
    branches: [main, dev]
    paths:
      - "database/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "database/**"

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2022]
        build-type: [Debug, Release]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: falcon_test
          POSTGRES_PASSWORD: falcon_test_password
          POSTGRES_DB: falcon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"
          vcpkgGitCommitId: "a42af01b72c28a8e1d7b48107b33e4f286a55ef6"

      - name: Configure CMake
        working-directory: database
        run: |
          cmake -B build/${{ matrix.build-type }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DBUILD_TESTS=ON

      - name: Build
        working-directory: database
        run: cmake --build build/${{ matrix.build-type }} --config ${{ matrix.build-type }} -j

      - name: Test
        working-directory: database
        env:
          TEST_DATABASE_URL: postgresql://falcon_test:falcon_test_password@localhost:5432/falcon_test
        run: |
          cd build/${{ matrix.build-type }}
          ctest --output-on-failure -C ${{ matrix.build-type }}
