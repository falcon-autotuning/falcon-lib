version: "3.8"

services:
  nats:
    image: nats:2.10-alpine
    container_name: falcon-comms-test-nats
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring
      - "6222:6222" # Cluster routes
    command: ["-js", "-m", "8222", "--store_dir=/data"] # Enable JetStream with persistence
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - nats_test_data:/data

volumes:
  nats_test_data:
